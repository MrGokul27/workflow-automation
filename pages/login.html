<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Stackly | Secure Login</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #051424;
        background-image: radial-gradient(
          circle at 2px 2px,
          #1e293b 1px,
          transparent 0
        );
        background-size: 24px 24px;
      }

      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }

      .node-connection {
        stroke-dasharray: 5;
        animation: dash 10s linear infinite;
      }

      @keyframes dash {
        to {
          stroke-dashoffset: -100;
        }
      }

      .glow-input:focus {
        box-shadow: 0 0 10px rgba(123, 208, 255, 0.3);
      }

      .node-float {
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
    </style>

    <script src="../assets/js/script.js" defer></script>
    <link rel="stylesheet" href="" />
    <link rel="stylesheet" href="../assets/css/tailwind.css" />
  </head>
  <body
    class="bg-background text-on-background font-body-md min-h-screen flex flex-col overflow-x-hidden py-3"
  >
    <!-- Background Atmospheric Nodes -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
      <svg
        class="w-full h-full opacity-20"
        preserveaspectratio="xMidYMid slice"
        viewbox="0 0 1000 1000"
      >
        <!-- Background Web -->
        <path
          class="node-connection"
          d="M100,200 L400,300 L300,600 L100,200"
          fill="none"
          stroke="#7bd0ff"
          stroke-width="1"
        ></path>
        <path
          class="node-connection"
          d="M400,300 L700,150 L850,450 L400,300"
          fill="none"
          stroke="#7bd0ff"
          stroke-width="1"
        ></path>
        <path
          class="node-connection"
          d="M300,600 L600,800 L850,450"
          fill="none"
          stroke="#7bd0ff"
          stroke-width="1"
        ></path>
        <!-- Nodes -->
        <g class="node-float" style="animation-delay: 0s">
          <rect
            fill="#00a6e0"
            height="20"
            rx="2"
            width="20"
            x="90"
            y="190"
          ></rect>
          <rect
            fill="#bec6e0"
            height="20"
            rx="2"
            width="20"
            x="390"
            y="290"
          ></rect>
        </g>
        <g class="node-float" style="animation-delay: 1s">
          <rect
            fill="#bdc2ff"
            height="20"
            rx="2"
            width="20"
            x="690"
            y="140"
          ></rect>
          <rect
            fill="#00a6e0"
            height="20"
            rx="2"
            width="20"
            x="290"
            y="590"
          ></rect>
        </g>
        <g class="node-float" style="animation-delay: 2s">
          <rect
            fill="#7bd0ff"
            height="20"
            rx="2"
            width="20"
            x="840"
            y="440"
          ></rect>
          <rect
            fill="#bec6e0"
            height="20"
            rx="2"
            width="20"
            x="590"
            y="790"
          ></rect>
        </g>
      </svg>
    </div>
    <!-- Logo -->
    <a
      href="../index.html"
      class="relative md:fixed z-50 inline-flex items-center px-4 py-2"
    >
      <img src="../assets/images/logoStackly.webp" alt="" width="100px" />
    </a>
    <!-- Main Content Canvas -->
    <main
      class="relative z-10 flex flex-col items-center justify-center grow p-margin-mobile md:p-0"
    >
      <!-- Login Card -->
      <div
        class="w-full max-w-[440px] bg-surface-container rounded-xl border border-outline-variant shadow-2xl overflow-hidden backdrop-blur-sm"
      >
        <!-- Back to Home -->
        <div class="">
          <a
            href="../index.html"
            class="inline-flex items-center gap-2 px-5 py-3 bg-surface-container text-on-surface transition-all duration-300 group"
          >
            <span
              class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform duration-300"
            >
              arrow_back
            </span>
            <span class="font-medium">Back to Home</span>
          </a>
        </div>
        <!-- Branding Header -->
        <div class="px-8 pb-6">
          <h1 class="font-headline-xl text-headline-xl text-on-surface mb-2">
            Sign in
          </h1>
          <p class="font-body-md text-on-surface-variant">
            to orchestrate your workflow
          </p>
        </div>
        <!-- Form Section -->
        <form
          class="px-8 pb-10 space-y-6"
          id="login-form"
          onsubmit="handleLogin(event)"
        >
          <!-- Role Selection -->
          <div class="space-y-2">
            <label
              class="block font-label-md text-label-md text-outline uppercase tracking-widest"
              for="role"
              >Access Role</label
            >
            <div class="relative">
              <select
                class="w-full h-12 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface appearance-none focus:outline-none focus:border-secondary transition-all glow-input"
                id="role"
                name="role"
              >
                <option value="admin">System Admin</option>
                <option value="devops">DevOps Engineer</option>
                <option value="architect">System Architect</option>
                <option value="operations-manager">Operations Manager</option>
                <option value="developer">Developer</option>
              </select>
              <div
                class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none"
              >
                <span
                  class="material-symbols-outlined text-on-surface-variant text-[20px]"
                  >badge</span
                >
              </div>
            </div>
          </div>
          <!-- Email Input -->
          <div class="space-y-2">
            <label
              class="block font-label-md text-label-md text-outline uppercase tracking-widest"
              for="email"
              >Email Address</label
            >
            <div class="relative">
              <input
                class="w-full h-12 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-secondary transition-all glow-input"
                id="email"
                name="email"
                placeholder="name@company.com"
                type="email"
                required
              />
              <div
                class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none"
              >
                <span
                  class="material-symbols-outlined text-on-surface-variant text-[20px]"
                  >alternate_email</span
                >
              </div>
            </div>
          </div>
          <!-- Password Input -->
          <div class="space-y-2">
            <div class="flex justify-between items-center">
              <label
                class="block font-label-md text-label-md text-outline uppercase tracking-widest"
                for="password"
                >Password</label
              >
              <a
                class="text-xs font-semibold text-secondary hover:underline transition-all"
                href="#"
                >Forgot Password?</a
              >
            </div>
            <div class="relative">
              <input
                class="w-full h-12 pl-12 pr-12 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-secondary transition-all glow-input"
                id="password"
                name="password"
                placeholder="••••••••"
                type="password"
                required
              />
              <div
                class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none"
              >
                <span
                  class="material-symbols-outlined text-on-surface-variant text-[20px]"
                  >lock</span
                >
              </div>
              <button
                class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors"
                type="button"
              >
                <span class="material-symbols-outlined text-[20px]"
                  >visibility</span
                >
              </button>
            </div>
          </div>
          <!-- Remember Me -->
          <div class="flex items-center space-x-3">
            <div class="relative flex items-center">
              <input
                class="w-5 h-5 rounded border-outline-variant bg-surface-container-lowest text-secondary focus:ring-secondary focus:ring-offset-surface"
                id="remember"
                name="remember"
                type="checkbox"
                required
              />
            </div>
            <label
              class="font-body-md text-on-surface-variant cursor-pointer select-none"
              for="remember"
              >Remember this session</label
            >
          </div>
          <!-- Action Button -->
          <button
            class="group relative w-full h-12 bg-secondary text-on-secondary font-bold rounded-lg overflow-hidden transition-all hover:bg-secondary/90 hover:scale-[1.01] active:scale-[0.98]"
            type="submit"
          >
            <span class="relative z-10 flex items-center justify-center gap-2">
              <span>Initialize Session</span>
              <span
                class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform"
                >arrow_forward</span
              >
            </span>
            <div
              class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"
            ></div>
          </button>
          <!-- Signup Link -->
          <p class="text-center font-body-md text-on-surface-variant pt-2">
            Don't have an account?
            <a
              class="text-secondary font-bold hover:underline"
              href="register.html"
              >Sign Up</a
            >
          </p>
        </form>
        <!-- Bottom Accent Bar -->
        <div
          class="h-1.5 w-full bg-gradient-to-r from-secondary via-primary to-tertiary"
        ></div>
      </div>
      <!-- Footer Info -->
      <div class="mt-8 flex flex-col items-center space-y-4">
        <div
          class="flex space-x-6 text-on-surface-variant font-label-md text-[11px] uppercase tracking-widest opacity-60"
        >
          <span class="flex items-center gap-1"
            ><span class="material-symbols-outlined text-[14px]"
              >verified_user</span
            >
            AES-256 Encrypted</span
          >
          <span class="flex items-center gap-1"
            ><span class="material-symbols-outlined text-[14px]"
              >cloud_done</span
            >
            99.9% Uptime</span
          >
        </div>
        <p class="text-[10px] text-on-surface-variant/40 font-code-sm">
          SYSTEM_VERSION: 2.4.0-STABLE // BUILD: 0xA4F29
        </p>
      </div>
    </main>
    <script>
      /* ── Login handler: save session, redirect to dashboard ── */
      function handleLogin(e) {
        e.preventDefault();
        const role = document.getElementById("role").value;
        const email = document.getElementById("email").value.trim();
        const remember = document.getElementById("remember").checked;

        if (!email) {
          document.getElementById("email").focus();
          return;
        }

        const userData = { role, email, loginTime: Date.now() };

        // Always store in sessionStorage; persist to localStorage only if "Remember me"
        sessionStorage.setItem("stackly_user", JSON.stringify(userData));
        if (remember)
          localStorage.setItem("stackly_user", JSON.stringify(userData));

        // Redirect to the dashboard main page
        window.location.href = "./dashboard/dashboard.html";
      }

      /* ── Password visibility toggle ── */
      document
        .querySelector('button[type="button"]')
        .addEventListener("click", function () {
          const input = document.getElementById("password");
          const icon = this.querySelector(".material-symbols-outlined");
          if (input.type === "password") {
            input.type = "text";
            icon.textContent = "visibility_off";
          } else {
            input.type = "password";
            icon.textContent = "visibility";
          }
        });

      /* ── Background node parallax ── */
      document.addEventListener("mousemove", (e) => {
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        document.querySelectorAll(".node-float").forEach((node, i) => {
          const speed = (i + 1) * 10;
          node.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
        });
      });
    </script>
  </body>
</html>
